version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - db_data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/slaytics.db
      - JWT_SECRET=${JWT_SECRET:-slaytics-production-secret-change-me}
      - PORT=3001
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8090:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
