server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Default route (SPA + static files for /command-center/*)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy (HTTP)
    #
    # Timeout chain:
    #   nginx (here)          → 600s (10 menit, atas)
    #   backend Express       → 360s untuk Facebook (callScraper PLATFORM_TIMEOUTS)
    #   pc-scraper Flask      → no explicit timeout, mengikuti gunicorn worker
    #   FB scraper Playwright → multi-pass 6-8 passes × 30-40s = 3-5 menit total
    #
    # Sebelumnya nginx timeout 300s (5 menit) — terlalu mepet vs backend 360s,
    # kalau FB scrape butuh >5min nginx return 504 padahal backend masih
    # sukses. Sekarang 600s (10min) kasih buffer cukup.
    #
    # proxy_send_timeout juga di-bump biar request body besar (mis. push
    # storage_state full) gak putus.
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
    }

    # WebSocket proxy (Fase 4)
    location /ws {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
